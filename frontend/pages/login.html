<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — HireReady</title>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
  <div id="navbar-root"></div>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <div class="auth-logo">
        <div class="logo-icon-lg">💼</div>
        <div style="font-family:var(--font-head);font-size:1.4rem;font-weight:800;">
          Hire<strong style="color:var(--brand-light)">Ready</strong>
        </div>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to continue your interview preparation journey</p>

      <div class="auth-error" id="auth-error"></div>

      <form class="auth-form" id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button class="btn btn-primary w-full" type="submit" id="submit-btn" style="justify-content:center;">
          Sign In
        </button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="register.html">Create one free</a>
      </p>

      <!-- Demo credentials hint for dev -->
      <div style="margin-top:20px;padding:12px;background:var(--surface-2);border-radius:var(--radius-md);font-size:0.78rem;color:var(--text-3);text-align:center;">
        <strong style="color:var(--text-2)">Demo:</strong> Register a new account to get started
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    document.getElementById('navbar-root').innerHTML = buildNavbar('');

    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = '/pages/dashboard.html';

    const form = document.getElementById('login-form');
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        await Auth.login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        Toast.success('Welcome back! 🎉');
        setTimeout(() => window.location.href = '/pages/dashboard.html', 500);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
